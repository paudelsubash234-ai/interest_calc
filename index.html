<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Loan Interest Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #F5F6FA;
  --white:      #FFFFFF;
  --navy:       #0B1F3A;
  --blue:       #1A6FE8;
  --blue-soft:  #EBF2FD;
  --teal:       #0ABFA3;
  --teal-soft:  #E6FAF7;
  --amber:      #F59E0B;
  --amber-soft: #FEF3C7;
  --red:        #EF4444;
  --red-soft:   #FEE2E2;
  --green:      #16A34A;
  --green-soft: #DCFCE7;
  --text:       #1A2332;
  --text2:      #4A5568;
  --text3:      #94A3B8;
  --border:     #E2E8F0;
  --border2:    #CBD5E1;
  --shadow-sm:  0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
  --shadow:     0 4px 16px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
  --shadow-lg:  0 10px 40px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
  --r:          16px;
  --r-sm:       10px;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Sora', sans-serif;
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.5;
}

/* ══════════════════════════════════════════════
   MOBILE LAYOUT  (default, < 860px)
══════════════════════════════════════════════ */
.page {
  max-width: 520px;
  margin: 0 auto;
  padding: 0 0 80px;
  min-height: 100vh;
}

/* ── Top bar ── */
.topbar {
  background: var(--navy);
  padding: 22px 22px 30px;
  position: relative;
  overflow: hidden;
}
.topbar::before {
  content: '';
  position: absolute;
  width: 260px; height: 260px; border-radius: 50%;
  background: rgba(26,111,232,0.18);
  top: -100px; right: -60px; pointer-events: none;
}
.topbar::after {
  content: '';
  position: absolute;
  width: 160px; height: 160px; border-radius: 50%;
  background: rgba(10,191,163,0.12);
  bottom: -60px; left: 30px; pointer-events: none;
}
.topbar-inner { position: relative; z-index: 1; }
.topbar-title {
  font-size: 22px; font-weight: 800; color: #fff;
  letter-spacing: -0.4px; line-height: 1.2;
}

/* ── Content area ── */
.content { padding: 16px 14px 0; }

/* ── Generic card ── */
.card {
  background: var(--white);
  border-radius: var(--r);
  box-shadow: var(--shadow);
  overflow: hidden;
  margin-bottom: 12px;
}
.card-head {
  padding: 14px 16px 11px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 9px;
}
.card-head-icon {
  width: 30px; height: 30px; border-radius: 8px;
  background: var(--blue-soft);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.card-head-icon svg { width: 15px; height: 15px; color: var(--blue); }
.card-head-title { font-size: 13px; font-weight: 700; color: var(--text); }
.card-body { padding: 16px; }

/* ── Fields ── */
.field { margin-bottom: 13px; }
.field:last-child { margin-bottom: 0; }
.field-label {
  font-size: 10px; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.09em;
  margin-bottom: 6px; display: block;
}
.field-label em { font-style: normal; font-weight: 400; text-transform: none; letter-spacing: 0; }

/* Amount */
.amount-wrap {
  display: flex; align-items: center;
  background: var(--bg); border: 1.5px solid var(--border);
  border-radius: var(--r-sm); overflow: hidden;
  transition: border-color 0.18s;
}
.amount-wrap:focus-within { border-color: var(--blue); }
.amount-prefix {
  padding: 0 12px; font-size: 13px; font-weight: 700; color: var(--text2);
  background: var(--border); height: 46px;
  display: flex; align-items: center;
  border-right: 1.5px solid var(--border); flex-shrink: 0;
  font-family: 'JetBrains Mono', monospace;
}
.amount-input {
  border: none; outline: none; background: transparent;
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px; font-weight: 500; color: var(--text);
  padding: 0 14px; height: 46px; width: 100%;
  appearance: textfield;
}
.amount-input::-webkit-inner-spin-button,
.amount-input::-webkit-outer-spin-button { -webkit-appearance: none; }

/* Date parts */
.date-parts {
  display: grid;
  grid-template-columns: 2fr 1.2fr 1.2fr;
  gap: 7px;
}
.date-part-wrap { display: flex; flex-direction: column; gap: 3px; }
.date-part-sub {
  font-size: 9px; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.08em; text-align: center;
}
.date-part-input {
  border: 1.5px solid var(--border); border-radius: var(--r-sm);
  background: var(--bg);
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px; font-weight: 500; color: var(--text);
  padding: 0 8px; height: 46px; width: 100%;
  text-align: center; outline: none;
  transition: border-color 0.18s; appearance: textfield;
}
.date-part-input::-webkit-inner-spin-button,
.date-part-input::-webkit-outer-spin-button { -webkit-appearance: none; }
.date-part-input:focus { border-color: var(--blue); background: #fff; }
.date-part-input::placeholder { color: var(--text3); font-size: 12px; }

/* Buttons */
.btn-row {
  display: grid; grid-template-columns: 1fr auto;
  gap: 10px; margin-top: 14px;
}
.btn-calc {
  background: var(--blue); border: none; border-radius: var(--r-sm);
  color: #fff; font-family: 'Sora', sans-serif;
  font-size: 14px; font-weight: 700;
  padding: 0 20px; height: 48px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  box-shadow: 0 4px 12px rgba(26,111,232,0.32);
  transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
}
.btn-calc:hover { background: #1560cc; box-shadow: 0 6px 18px rgba(26,111,232,0.38); }
.btn-calc:active { transform: scale(0.98); }
.btn-calc svg { width: 15px; height: 15px; flex-shrink: 0; }

.btn-reset {
  background: var(--bg); border: 1.5px solid var(--border);
  border-radius: var(--r-sm); color: var(--text3);
  font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 600;
  padding: 0 16px; height: 48px; cursor: pointer; white-space: nowrap;
  transition: border-color 0.15s, color 0.15s;
}
.btn-reset:hover { border-color: var(--red); color: var(--red); }

/* Error */
.error-msg {
  background: var(--red-soft); border: 1px solid rgba(239,68,68,0.2);
  border-radius: 8px; padding: 10px 13px;
  color: var(--red); font-size: 12px; font-weight: 500;
  margin-top: 10px; display: none; align-items: center; gap: 8px;
}
.error-msg.show { display: flex; }

/* ── Summary section (mobile) ── */
/* Big 3 totals first */
.summary-totals {
  background: var(--navy);
  border-radius: var(--r);
  box-shadow: var(--shadow-lg);
  padding: 18px 16px;
  margin-bottom: 12px;
  position: relative; overflow: hidden;
}
.summary-totals::before {
  content: ''; position: absolute;
  width: 220px; height: 220px; border-radius: 50%;
  background: rgba(26,111,232,0.15);
  top: -80px; right: -50px; pointer-events: none;
}
.summary-totals-inner { position: relative; z-index: 1; }

.tot-row {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 9px 0; border-bottom: 1px solid rgba(255,255,255,0.07);
}
.tot-row:first-child { padding-top: 0; }
.tot-row:last-child { border-bottom: none; padding-bottom: 0; }
.tot-label {
  font-size: 12px; font-weight: 500;
  color: rgba(255,255,255,0.55); flex-shrink: 0;
}
.tot-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px; font-weight: 700; color: #fff;
  text-align: right;
}
.tot-val.accent { color: var(--teal); font-size: 17px; }
.tot-val .rs-sm { font-size: 10px; opacity: 0.7; margin-right: 2px; }

/* Secondary stats row */
.summary-stats {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; margin-bottom: 12px;
}
.stat-card {
  background: var(--white); border-radius: var(--r);
  box-shadow: var(--shadow-sm); padding: 14px 13px 12px;
  position: relative; overflow: hidden;
}
.stat-card::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 3px;
  background: var(--sc, var(--blue));
  border-radius: var(--r) var(--r) 0 0;
}
.stat-label {
  font-size: 9px; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.09em; margin-bottom: 5px;
}
.stat-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px; font-weight: 700; color: var(--sc, var(--text));
  word-break: break-all;
}
.stat-val .rs-s { font-size: 10px; opacity: 0.7; margin-right: 1px; }
.stat-sub { font-size: 9px; color: var(--text3); margin-top: 3px; }

/* Diff row */
.diff-row {
  background: var(--white); border-radius: var(--r);
  box-shadow: var(--shadow-sm); padding: 12px 14px;
  margin-bottom: 12px;
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.diff-label { font-size: 11px; font-weight: 500; color: var(--text2); }
.diff-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px; font-weight: 700; color: var(--amber);
  white-space: nowrap;
}
.diff-sub { font-size: 10px; color: var(--text3); margin-top: 1px; }

/* ── Period table card (mobile) ── */
.tbl-card {
  background: var(--white); border-radius: var(--r);
  box-shadow: var(--shadow); overflow: hidden; margin-bottom: 12px;
}
.tbl-title-row {
  padding: 14px 16px 11px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.tbl-title { font-size: 13px; font-weight: 700; color: var(--text); }
.tbl-badge {
  font-size: 10px; font-weight: 700; color: var(--blue);
  background: var(--blue-soft); padding: 3px 9px;
  border-radius: 20px; letter-spacing: 0.04em;
}

/* Mobile period item */
.period-item { border-bottom: 1px solid var(--border); }
.period-item:last-child { border-bottom: none; }
.period-main {
  display: grid; grid-template-columns: 1fr auto;
  gap: 10px; padding: 12px 16px 5px; align-items: start;
}
.period-idx-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--blue-soft); color: var(--blue);
  font-size: 9px; font-weight: 700; flex-shrink: 0; margin-right: 4px;
}
.period-dates {
  font-size: 12px; font-weight: 600; color: var(--text);
  font-family: 'JetBrains Mono', monospace;
}
.period-days { font-size: 10px; color: var(--text3); font-weight: 500; margin-top: 2px; }
.period-int { text-align: right; }
.period-int-val {
  font-size: 14px; font-weight: 700; color: var(--amber);
  font-family: 'JetBrains Mono', monospace;
}
.period-int-lbl { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 1px; }
.period-loan {
  font-size: 11px; color: var(--text3);
  font-family: 'JetBrains Mono', monospace;
  padding: 0 16px 4px;
}
.period-loan span { color: var(--blue); font-weight: 500; }
.period-cumint {
  font-size: 10px; color: var(--text3);
  font-family: 'JetBrains Mono', monospace;
  padding: 0 16px 4px;
}
.period-cumint span { color: var(--text2); font-weight: 500; }
.period-fn {
  font-size: 10px; color: var(--text3); font-style: italic;
  padding: 2px 16px 11px;
  display: flex; align-items: center; gap: 5px;
}
.period-fn::before {
  content: ''; display: inline-block;
  width: 12px; height: 1px; background: var(--border2); flex-shrink: 0;
}

/* Print button */
.btn-print-wrap { padding: 4px 0 0; }
.btn-print {
  width: 100%; background: var(--white);
  border: 1.5px solid var(--border2); border-radius: var(--r-sm);
  color: var(--text2); font-family: 'Sora', sans-serif;
  font-size: 13px; font-weight: 600;
  padding: 0 20px; height: 48px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  box-shadow: var(--shadow-sm); transition: all 0.15s;
}
.btn-print:hover { border-color: var(--blue); color: var(--blue); }
.btn-print svg { width: 15px; height: 15px; }

/* Empty state */
.empty-state {
  text-align: center; padding: 48px 20px;
  color: var(--text3);
}
.empty-icon {
  width: 70px; height: 70px; border-radius: 50%;
  background: var(--blue-soft);
  display: flex; align-items: center; justify-content: center; margin: 0 auto 14px;
}
.empty-icon svg { width: 30px; height: 30px; color: var(--blue); opacity: 0.6; }
.empty-title { font-size: 14px; font-weight: 700; color: var(--text2); margin-bottom: 5px; }
.empty-sub { font-size: 12px; line-height: 1.6; }

/* Animations */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.animate-in { animation: fadeUp 0.28s ease both; }

/* ══════════════════════════════════════════════
   DESKTOP LAYOUT  (≥ 860px)
══════════════════════════════════════════════ */
@media (min-width: 860px) {

  body { background: var(--bg); }

  .page {
    max-width: 1160px;
    display: grid;
    grid-template-columns: 360px 1fr;
    grid-template-rows: auto 1fr;
    gap: 0;
    padding: 0 0 60px;
    min-height: 100vh;
    align-items: start;
  }

  /* Topbar spans full width */
  .topbar {
    grid-column: 1 / -1;
    padding: 26px 36px 34px;
  }
  .topbar-title { font-size: 26px; }

  /* Left column: input card */
  .content {
    padding: 24px 0 0 24px;
    grid-column: 1;
    grid-row: 2;
    position: sticky;
    top: 24px;
  }

  /* Right column: results */
  .results-col {
    padding: 24px 24px 0 18px;
    grid-column: 2;
    grid-row: 2;
  }

  .card { margin-bottom: 0; box-shadow: var(--shadow-lg); }
  .card-body { padding: 20px; }

  /* Hide mobile summary cards in desktop */
  .summary-totals,
  .summary-stats,
  .diff-row { display: none !important; }

  /* Desktop summary: two-panel side by side */
  .desktop-summary {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 16px;
  }

  .desktop-tot-card {
    background: var(--navy);
    border-radius: var(--r);
    box-shadow: var(--shadow-lg);
    padding: 18px 20px;
    position: relative; overflow: hidden;
  }
  .desktop-tot-card::before {
    content: ''; position: absolute;
    width: 180px; height: 180px; border-radius: 50%;
    background: rgba(26,111,232,0.15);
    top: -70px; right: -40px; pointer-events: none;
  }
  .desktop-tot-card-inner { position: relative; z-index: 1; }
  .desktop-tot-label {
    font-size: 10px; font-weight: 700;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px;
  }
  .desktop-tot-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px; font-weight: 800; color: #fff;
    word-break: break-all; line-height: 1.2;
  }
  .desktop-tot-val.accent { color: var(--teal); }
  .desktop-tot-val .rs-d { font-size: 13px; opacity: 0.65; margin-right: 2px; }
  .desktop-tot-sub { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 6px; }

  /* Secondary stats row desktop */
  .desktop-stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  .desktop-stat-card {
    background: var(--white); border-radius: var(--r);
    box-shadow: var(--shadow-sm); padding: 14px 16px;
    position: relative; overflow: hidden;
  }
  .desktop-stat-card::before {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
    background: var(--dsc, var(--blue));
    border-radius: var(--r) var(--r) 0 0;
  }
  .desktop-stat-label {
    font-size: 9px; font-weight: 700; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 5px;
  }
  .desktop-stat-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px; font-weight: 700; color: var(--dsc, var(--text));
  }
  .desktop-stat-val .rs-ds { font-size: 10px; opacity: 0.65; margin-right: 2px; }
  .desktop-stat-sub { font-size: 10px; color: var(--text3); margin-top: 3px; }

  /* Desktop table */
  .tbl-card {
    border-radius: var(--r);
    box-shadow: var(--shadow);
  }
  .tbl-title-row { padding: 16px 20px 13px; }
  .tbl-title { font-size: 14px; }

  /* Hide mobile period items on desktop */
  .mobile-periods { display: none; }

  /* Desktop table proper */
  .desktop-table-wrap { overflow-x: auto; }
  table.dt {
    width: 100%; border-collapse: collapse;
    font-size: 12.5px; font-family: 'JetBrains Mono', monospace;
  }
  table.dt thead th {
    background: #F8FAFC; padding: 10px 14px;
    font-size: 9.5px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text3);
    white-space: nowrap; border-bottom: 1px solid var(--border);
    text-align: right;
  }
  table.dt thead th:first-child { text-align: center; width: 36px; }
  table.dt thead th:nth-child(2),
  table.dt thead th:nth-child(3) { text-align: left; }

  table.dt tbody tr.dr { border-bottom: none; }
  table.dt tbody tr.dr:hover { background: #F8FAFC; }
  table.dt tbody tr.dr:hover + tr.fn-row { background: #F8FAFC; }

  table.dt tbody tr.fn-row td {
    padding: 1px 14px 9px;
    font-size: 10px; font-style: italic;
    color: var(--text3); border-bottom: 1px solid var(--border);
    text-align: left;
    font-family: 'Sora', sans-serif;
  }
  table.dt tbody tr.fn-row:last-child td { border-bottom: none; }

  table.dt tbody td {
    padding: 11px 14px; text-align: right;
    color: var(--text); white-space: nowrap;
  }
  table.dt tbody td:first-child { text-align: center; }
  table.dt tbody td:nth-child(2),
  table.dt tbody td:nth-child(3) { text-align: left; }

  .dt-idx {
    display: inline-flex; align-items: center; justify-content: center;
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--blue-soft); color: var(--blue);
    font-size: 9px; font-weight: 700;
  }
  .dt-dates { font-size: 12px; font-weight: 500; }
  .dt-period-type {
    font-size: 10px; color: var(--text3);
    font-family: 'Sora', sans-serif; margin-top: 1px;
  }
  .dt-int { color: var(--amber); font-weight: 600; }
  .dt-principal { color: var(--blue); }
  .dt-cumint { color: var(--text2); font-weight: 500; }
  .dt-closing { color: var(--text); font-weight: 600; }

  /* Total rows desktop table */
  table.dt tbody tr.dt-total td {
    background: #F1F5F9; font-weight: 700;
    color: var(--navy); padding: 11px 14px;
    border-bottom: 1px solid var(--border);
  }
  table.dt tbody tr.dt-total.highlight td {
    background: var(--navy); color: var(--teal);
    font-size: 13px;
  }
  table.dt tbody tr.dt-total-sep td {
    padding: 0; border-bottom: 2px solid var(--navy);
  }

  /* Print button desktop */
  .btn-print-wrap { padding: 12px 0 0; }

  /* Empty state on desktop right column */
  .empty-state { padding: 64px 20px; }
}


/* ══════════════════════════════════════════════
   PRINT STYLES
══════════════════════════════════════════════ */
@media print {
  * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  body { background: #fff !important; font-size: 12px; }

  /* Hide everything except what we want */
  .topbar,
  .content,
  .desktop-summary,
  .desktop-stats-row,
  .summary-totals,
  .summary-stats,
  .diff-row,
  .tbl-badge,
  .btn-print-wrap,
  .btn-print-wrap,
  .empty-state,
  .mobile-periods,
  .desktop-stat-card::before { display: none !important; }

  /* Show print header */
  .print-header {
    display: flex !important;
    flex-wrap: wrap; gap: 5px 18px;
    border: 1px solid #ddd; border-radius: 5px;
    padding: 8px 12px; margin-bottom: 10px;
    background: #f9fafb; font-size: 11px; color: #222;
  }
  .print-header strong { font-weight: 700; }

  /* Results column full width */
  .page { display: block !important; max-width: 100% !important; padding: 0 !important; }
  .results-col { padding: 0 !important; }

  .tbl-card {
    border: 1px solid #ddd; border-radius: 5px;
    box-shadow: none !important; margin-bottom: 8px;
  }
  .tbl-title-row { padding: 8px 12px; border-bottom: 1px solid #ddd; }
  .tbl-title { font-size: 12px; color: #111; }

  /* Show desktop table in print */
  .mobile-periods { display: none !important; }
  .desktop-table-wrap { display: block !important; }

  table.dt { font-size: 10px !important; }
  table.dt thead th {
    background: #f0f0f0 !important; color: #444 !important;
    padding: 6px 10px !important; border-bottom: 1px solid #ccc !important;
  }
  table.dt tbody td { padding: 7px 10px !important; color: #111 !important; }
  table.dt tbody tr.fn-row td { color: #777 !important; padding: 1px 10px 6px !important; font-size: 9px !important; }
  table.dt tbody tr.dr:hover, table.dt tbody tr.dr:hover + tr.fn-row { background: transparent !important; }
  .dt-int { color: #333 !important; }
  .dt-principal, .dt-closing, .dt-cumint { color: #111 !important; }
  .dt-idx { background: #eee !important; color: #333 !important; }

  table.dt tbody tr.dt-total td { background: #f4f4f4 !important; color: #111 !important; }
  table.dt tbody tr.dt-total.highlight td { background: #1A2332 !important; color: #0ABFA3 !important; }

  /* Print totals summary */
  .print-totals {
    display: block !important;
    border: 1px solid #222; border-radius: 5px;
    padding: 10px 12px; margin-top: 8px;
    background: #1A2332 !important; color: #fff;
  }
  .print-totals table { width: 100%; font-size: 11px; }
  .print-totals td { padding: 4px 6px; color: #fff; font-family: 'JetBrains Mono', monospace; }
  .print-totals td:last-child { text-align: right; font-weight: 700; }
  .print-totals tr:last-child td { color: #0ABFA3; font-size: 13px; }
}
</style>
</head>
<body>
<div class="page">

  <!-- ── Top Bar ── -->
  <div class="topbar">
    <div class="topbar-inner">
      <div class="topbar-title">Loan Interest Calculator</div>
    </div>
  </div>

  <!-- ── LEFT / MOBILE: Input ── -->
  <div class="content">
    <div class="card animate-in" style="margin-top:0" id="inputCard">
      <div class="card-head">
        <div class="card-head-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/>
          </svg>
        </div>
        <span class="card-head-title">Loan Details</span>
      </div>
      <div class="card-body">

        <div class="field">
          <label class="field-label">Loan Amount</label>
          <div class="amount-wrap">
            <div class="amount-prefix">Rs.</div>
            <input class="amount-input" type="number" id="loanAmount"
              placeholder="0" min="1" step="1" inputmode="numeric">
          </div>
        </div>

        <div class="field">
          <label class="field-label">Loan Taken / Last Interest Paid Date</label>
          <div class="date-parts">
            <div class="date-part-wrap">
              <input class="date-part-input" type="number" id="sYear" placeholder="YYYY" min="1990" max="2099" inputmode="numeric">
              <div class="date-part-sub">Year</div>
            </div>
            <div class="date-part-wrap">
              <input class="date-part-input" type="number" id="sMonth" placeholder="MM" min="1" max="12" inputmode="numeric">
              <div class="date-part-sub">Month</div>
            </div>
            <div class="date-part-wrap">
              <input class="date-part-input" type="number" id="sDay" placeholder="DD" min="1" max="31" inputmode="numeric">
              <div class="date-part-sub">Day</div>
            </div>
          </div>
        </div>

        <div class="field">
          <label class="field-label">Calculate Up To <em style="font-size:9px;color:var(--text3)">(leave blank for today)</em></label>
          <div class="date-parts">
            <div class="date-part-wrap">
              <input class="date-part-input" type="number" id="eYear" placeholder="YYYY" min="1990" max="2099" inputmode="numeric">
              <div class="date-part-sub">Year</div>
            </div>
            <div class="date-part-wrap">
              <input class="date-part-input" type="number" id="eMonth" placeholder="MM" min="1" max="12" inputmode="numeric">
              <div class="date-part-sub">Month</div>
            </div>
            <div class="date-part-wrap">
              <input class="date-part-input" type="number" id="eDay" placeholder="DD" min="1" max="31" inputmode="numeric">
              <div class="date-part-sub">Day</div>
            </div>
          </div>
        </div>

        <div id="errorMsg" class="error-msg">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="errorText"></span>
        </div>

        <div class="btn-row">
          <button class="btn-calc" onclick="calculate()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
              <polyline points="16 7 22 7 22 13"/>
            </svg>
            Calculate
          </button>
          <button class="btn-reset" onclick="resetForm()">↺ Reset</button>
        </div>
      </div>
    </div>
  </div><!-- /content -->

  <!-- ── RIGHT / MOBILE BELOW: Results ── -->
  <div class="results-col" id="resultsCol">

    <!-- Print header (print only) -->
    <div class="print-header" id="printHeader" style="display:none"></div>

    <!-- Results wrapper -->
    <div id="resultsSection" style="display:none">

      <!-- MOBILE: Big totals first -->
      <div class="summary-totals animate-in" id="mobileTotals">
        <div class="summary-totals-inner" id="mobileTotalsInner"></div>
      </div>

      <!-- MOBILE: Days + Without compounding -->
      <div class="summary-stats animate-in" id="mobileStats"></div>

      <!-- MOBILE: Difference row -->
      <div class="diff-row animate-in" id="mobileDiff"></div>

      <!-- DESKTOP: summary panels (hidden on mobile) -->
      <div class="desktop-summary animate-in" id="desktopTotCards"></div>
      <div class="desktop-stats-row animate-in" id="desktopStatsRow"></div>

      <!-- Period table — shared title, different body per viewport -->
      <div class="tbl-card animate-in">
        <div class="tbl-title-row">
          <span class="tbl-title">Loan Interest Particulars</span>
          <span class="tbl-badge" id="periodBadge"></span>
        </div>

        <!-- Mobile period cards -->
        <div class="mobile-periods" id="mobilePeriods"></div>

        <!-- Desktop table -->
        <div class="desktop-table-wrap" id="desktopTableWrap">
          <table class="dt">
            <thead>
              <tr>
                <th>#</th>
                <th>Start Date</th>
                <th>End Date</th>
                <th>Days</th>
                <th>Loan Amount (Rs.)</th>
                <th>Interest (Rs.)</th>
                <th>Total Interest (Rs.)</th>
                <th>O/S Principal (Rs.)</th>
              </tr>
            </thead>
            <tbody id="desktopTbody"></tbody>
          </table>
        </div>

        <!-- Print button inside the table card -->
        <div class="btn-print-wrap" style="padding:14px 16px">
          <button class="btn-print" onclick="printQuotation()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 6 2 18 2 18 9"/>
              <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
              <rect x="6" y="14" width="12" height="8"/>
            </svg>
            Print Interest Quotation
          </button>
        </div>
      </div>

      <!-- Print totals block (print only) -->
      <div class="print-totals" id="printTotals" style="display:none"></div>

    </div><!-- /resultsSection -->

    <!-- Empty state -->
    <div class="empty-state animate-in" id="emptyState">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 7H6a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3"/>
          <rect x="9" y="3" width="6" height="4" rx="1"/>
          <line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/>
        </svg>
      </div>
      <div class="empty-title">Ready to Calculate</div>
      <div class="empty-sub">Enter loan amount and dates<br>to see the interest breakdown.</div>
    </div>

  </div><!-- /results-col -->

</div><!-- /page -->

<script>
// ── Boundaries ────────────────────────────────────────────────────────────────
const BOUNDARIES = [
  ['2016-07-15', 0.10, 'Ashadh end 2073'],
  ['2017-01-13', 0.10, 'Poush end 2073'],
  ['2017-07-15', 0.10, 'Ashadh end 2074'],
  ['2018-01-14', 0.11, 'Poush end 2074'],
  ['2018-07-16', 0.11, 'Ashadh end 2075'],
  ['2019-01-14', 0.10, 'Poush end 2075'],
  ['2019-07-16', 0.10, 'Ashadh end 2076'],
  ['2020-01-14', 0.10, 'Poush end 2076'],
  ['2020-07-15', 0.10, 'Ashadh end 2077'],
  ['2021-01-13', 0.10, 'Poush end 2077'],
  ['2021-07-15', 0.10, 'Ashadh end 2078'],
  ['2022-01-14', 0.10, 'Poush end 2078'],
  ['2022-07-16', 0.10, 'Ashadh end 2079'],
  ['2022-10-17', 0.10, 'Kartik 2079 (rate adjustment, no capitalization)'],
  ['2023-01-14', 0.11, 'Poush end 2079'],
  ['2023-07-16', 0.11, 'Ashadh end 2080'],
  ['2024-01-14', 0.10, 'Poush end 2080'],
  ['2024-07-15', 0.10, 'Ashadh end 2081'],
  ['2025-01-13', 0.10, 'Poush end 2081'],
  ['2025-07-16', 0.10, 'Ashadh end 2082'],
  ['2026-01-14', 0.10, 'Poush end 2082'],
  ['2026-07-16', 0.10, 'Ashadh end 2083'],
  ['2027-01-14', 0.10, 'Poush end 2083'],
  ['2027-07-16', 0.10, 'Ashadh end 2084'],
  ['2028-01-13', 0.10, 'Poush end 2084'],
  ['2028-07-15', 0.10, 'Ashadh end 2085'],
  ['2029-01-13', 0.10, 'Poush end 2085'],
  ['2029-07-15', 0.10, 'Ashadh end 2086'],
  ['2030-01-13', 0.10, 'Poush end 2086'],
];
const NO_CAP = new Set(['2022-10-17']);

const pd = s => { const [y,m,d] = s.split('-').map(Number); return new Date(y,m-1,d); };
const toKey = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const dys = (a,b) => Math.round((b-a)/86400000);
const fmt = n => n.toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtD = d => `${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()}`;

function rateFor(endDate) {
  for (const [ds,rate] of BOUNDARIES) { if (endDate<=pd(ds)) return rate; }
  return 0.10;
}
function nextLabel(after) {
  for (const [ds,,label] of BOUNDARIES) { if (pd(ds)>after) return 'Partial period · towards '+label; }
  return 'Current partial period';
}

// Input enforcement
function maxLen(el, max) {
  el.addEventListener('input', () => {
    if (el.value.length > max) el.value = el.value.slice(0, max);
  });
}
maxLen(document.getElementById('sYear'), 4);
maxLen(document.getElementById('eYear'), 4);
maxLen(document.getElementById('sMonth'), 2);
maxLen(document.getElementById('eMonth'), 2);
maxLen(document.getElementById('sDay'), 2);
maxLen(document.getElementById('eDay'), 2);

// Clamp month/day
['sMonth','eMonth'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('blur', () => { if(el.value>12) el.value=12; if(el.value<1&&el.value!='') el.value=1; });
});
['sDay','eDay'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('blur', () => { if(el.value>31) el.value=31; if(el.value<1&&el.value!='') el.value=1; });
});

// Auto-advance
[['sYear','sMonth'],['sMonth','sDay'],['eYear','eMonth'],['eMonth','eDay']].forEach(([f,t]) => {
  const from = document.getElementById(f), to = document.getElementById(t);
  from.addEventListener('input', () => { if(from.value.length >= (f.includes('Year')?4:2)) to.focus(); });
});

function getDate(yId,mId,dId) {
  const y=parseInt(document.getElementById(yId).value);
  const m=parseInt(document.getElementById(mId).value);
  const d=parseInt(document.getElementById(dId).value);
  if(!y||!m||!d) return null;
  if(y<1900||y>2099||m<1||m>12||d<1||d>31) return null;
  const dt=new Date(y,m-1,d);
  if(dt.getMonth()!==m-1) return null;
  return dt;
}

function calculate() {
  const errEl=document.getElementById('errorMsg');
  const errTxt=document.getElementById('errorText');
  const showErr=msg=>{ errTxt.textContent=msg; errEl.className='error-msg show'; };
  errEl.className='error-msg';

  const loanAmt=parseFloat(document.getElementById('loanAmount').value);
  if(!loanAmt||loanAmt<=0){ showErr('Please enter a valid loan amount.'); return; }

  const startDate=getDate('sYear','sMonth','sDay');
  if(!startDate){ showErr('Please enter a valid start date (Year, Month, Day).'); return; }

  const eY=document.getElementById('eYear').value;
  const eM=document.getElementById('eMonth').value;
  const eD=document.getElementById('eDay').value;
  let calcDate;
  if(eY||eM||eD){
    calcDate=getDate('eYear','eMonth','eDay');
    if(!calcDate){ showErr('Please enter a valid end date, or leave all three fields blank for today.'); return; }
  } else {
    calcDate=new Date(); calcDate.setHours(0,0,0,0);
  }
  if(calcDate<=startDate){ showErr('End date must be after the start date.'); return; }

  // Build segments
  const segs=[]; let segStart=startDate;
  for(const [ds,,label] of BOUNDARIES){
    const bDate=pd(ds);
    if(bDate<=startDate) continue;
    if(bDate>=calcDate) break;
    const isNoCap=NO_CAP.has(ds);
    segs.push({start:segStart,end:bDate,rate:rateFor(bDate),noCap:isNoCap,label});
    segStart=new Date(bDate.getTime()+86400000);
  }
  if(segStart<calcDate)
    segs.push({start:segStart,end:calcDate,rate:rateFor(calcDate),noCap:false,label:nextLabel(segStart)});

  // Calculate
  let principal=loanAmt, cumInterest=0, pendingInterest=0, simpleTotal=0;
  const rows=[];

  for(let i=0;i<segs.length;i++){
    const s=segs[i]; const isLast=i===segs.length-1;
    const d=dys(s.start,s.end);
    const interest=principal*s.rate*d/365;
    cumInterest+=interest;
    simpleTotal+=loanAmt*s.rate*d/365;
    let closingPrincipal=principal, capitalize=false;
    if(!isLast){
      if(s.noCap){ pendingInterest+=interest; }
      else { capitalize=true; closingPrincipal=principal+interest+pendingInterest; pendingInterest=0; }
    }
    rows.push({idx:i+1,start:s.start,end:s.end,days:d,rate:s.rate,
      openPrincipal:principal,interest,cumInterest,closingPrincipal,label:s.label,capitalized:capitalize});
    if(capitalize) principal=closingPrincipal;
  }

  const totalInterest=cumInterest;
  const totalOS=loanAmt+totalInterest;
  const totalDays=dys(startDate,calcDate);
  const diff=totalInterest-simpleTotal;

  // Show results
  document.getElementById('emptyState').style.display='none';
  document.getElementById('resultsSection').style.display='block';

  // ── MOBILE: Big totals
  document.getElementById('mobileTotalsInner').innerHTML=`
    <div class="tot-row">
      <span class="tot-label">Total Loan Interest</span>
      <span class="tot-val"><span class="rs-sm">Rs.</span>${fmt(totalInterest)}</span>
    </div>
    <div class="tot-row">
      <span class="tot-label">Principal Loan Amount</span>
      <span class="tot-val"><span class="rs-sm">Rs.</span>${fmt(loanAmt)}</span>
    </div>
    <div class="tot-row">
      <span class="tot-label">Total O/S Loan + Interest</span>
      <span class="tot-val accent"><span class="rs-sm">Rs.</span>${fmt(totalOS)}</span>
    </div>`;

  // ── MOBILE: Stats (days + without compounding)
  document.getElementById('mobileStats').innerHTML=`
    <div class="stat-card" style="--sc:var(--blue)">
      <div class="stat-label">Total Days</div>
      <div class="stat-val">${totalDays}</div>
      <div class="stat-sub">${fmtD(startDate)} → ${fmtD(calcDate)}</div>
    </div>
    <div class="stat-card" style="--sc:var(--green)">
      <div class="stat-label">Without Compounding</div>
      <div class="stat-val"><span class="rs-s">Rs.</span>${fmt(simpleTotal)}</div>
      <div class="stat-sub">Simple interest</div>
    </div>`;

  // ── MOBILE: Diff
  document.getElementById('mobileDiff').innerHTML=`
    <div>
      <div class="diff-label">Compounding difference</div>
      <div class="diff-sub" style="font-size:10px;color:var(--text3);margin-top:1px">Compound vs. simple interest</div>
    </div>
    <div class="diff-val">+&nbsp;Rs.&nbsp;${fmt(diff)}</div>`;

  // ── DESKTOP: Two big cards
  document.getElementById('desktopTotCards').innerHTML=`
    <div class="desktop-tot-card">
      <div class="desktop-tot-card-inner">
        <div class="desktop-tot-label">Total Loan Interest</div>
        <div class="desktop-tot-val"><span class="rs-d">Rs.</span>${fmt(totalInterest)}</div>
        <div class="desktop-tot-sub">${rows.length} period${rows.length!==1?'s':''} · compound</div>
      </div>
    </div>
    <div class="desktop-tot-card" style="">
      <div class="desktop-tot-card-inner">
        <div class="desktop-tot-label">Total O/S Loan + Interest</div>
        <div class="desktop-tot-val accent"><span class="rs-d">Rs.</span>${fmt(totalOS)}</div>
        <div class="desktop-tot-sub">Principal Rs. ${fmt(loanAmt)}</div>
      </div>
    </div>`;

  // ── DESKTOP: Stats row (days, simple, diff)
  document.getElementById('desktopStatsRow').innerHTML=`
    <div class="desktop-stat-card" style="--dsc:var(--blue)">
      <div class="desktop-stat-label">Total Days</div>
      <div class="desktop-stat-val">${totalDays}</div>
      <div class="desktop-stat-sub">${fmtD(startDate)} → ${fmtD(calcDate)}</div>
    </div>
    <div class="desktop-stat-card" style="--dsc:var(--green)">
      <div class="desktop-stat-label">Without Compounding</div>
      <div class="desktop-stat-val"><span class="rs-ds">Rs.</span>${fmt(simpleTotal)}</div>
      <div class="desktop-stat-sub">Simple interest baseline</div>
    </div>
    <div class="desktop-stat-card" style="--dsc:var(--amber)">
      <div class="desktop-stat-label">Compounding Difference</div>
      <div class="desktop-stat-val"><span class="rs-ds">Rs.</span>${fmt(diff)}</div>
      <div class="desktop-stat-sub">Extra due to capitalization</div>
    </div>`;

  document.getElementById('periodBadge').textContent=`${rows.length} periods`;

  // ── MOBILE: Period cards
  let mHtml='';
  for(const r of rows){
    mHtml+=`
    <div class="period-item">
      <div class="period-main">
        <div>
          <div class="period-dates">
            <span class="period-idx-badge">${r.idx}</span>${fmtD(r.start)}&nbsp;→&nbsp;${fmtD(r.end)}
          </div>
          <div class="period-days">${r.days} days &nbsp;·&nbsp; ${(r.rate*100).toFixed(0)}% p.a.</div>
        </div>
        <div class="period-int">
          <div class="period-int-val">Rs. ${fmt(r.interest)}</div>
          <div class="period-int-lbl">Interest</div>
        </div>
      </div>
      <div class="period-loan">Loan Amount: <span>Rs. ${fmt(r.openPrincipal)}</span></div>
      <div class="period-cumint">Cumulative Interest: <span>Rs. ${fmt(r.cumInterest)}</span></div>
      <div class="period-fn">${r.label}</div>
    </div>`;
  }
  document.getElementById('mobilePeriods').innerHTML=mHtml;

  // ── DESKTOP: Table rows
  let dtHtml='';
  for(const r of rows){
    dtHtml+=`
    <tr class="dr">
      <td><span class="dt-idx">${r.idx}</span></td>
      <td class="dt-dates">${fmtD(r.start)}</td>
      <td class="dt-dates">${fmtD(r.end)}</td>
      <td>${r.days}</td>
      <td class="dt-principal">${fmt(r.openPrincipal)}</td>
      <td class="dt-int">${fmt(r.interest)}</td>
      <td class="dt-cumint">${fmt(r.cumInterest)}</td>
      <td class="dt-closing">${fmt(r.closingPrincipal)}</td>
    </tr>
    <tr class="fn-row"><td colspan="8">↳ ${r.label}</td></tr>`;
  }
  dtHtml+=`
  <tr class="dt-total-sep"><td colspan="8"></td></tr>
  <tr class="dt-total">
    <td colspan="4" style="font-family:'Sora',sans-serif">Total Loan Interest</td>
    <td></td>
    <td class="dt-int">${fmt(totalInterest)}</td>
    <td></td>
    <td></td>
  </tr>
  <tr class="dt-total">
    <td colspan="4" style="font-family:'Sora',sans-serif">Total O/S Loan + Interest</td>
    <td class="dt-principal">${fmt(loanAmt)}</td>
    <td class="dt-int">${fmt(totalInterest)}</td>
    <td></td>
    <td class="dt-closing" style="font-size:13px">${fmt(totalOS)}</td>
  </tr>`;
  document.getElementById('desktopTbody').innerHTML=dtHtml;

  // Print data
  document.getElementById('printHeader').innerHTML=
    `<span>Loan Amount: <strong>Rs. ${fmt(loanAmt)}</strong></span>`+
    `<span>From: <strong>${fmtD(startDate)}</strong></span>`+
    `<span>To: <strong>${fmtD(calcDate)}</strong></span>`+
    `<span>Days: <strong>${totalDays}</strong></span>`+
    `<span>Total Interest: <strong>Rs. ${fmt(totalInterest)}</strong></span>`+
    `<span>O/S Total: <strong>Rs. ${fmt(totalOS)}</strong></span>`;

  document.getElementById('printTotals').innerHTML=`
    <table>
      <tr><td>Total Loan Interest</td><td>Rs. ${fmt(totalInterest)}</td></tr>
      <tr><td>Principal Amount</td><td>Rs. ${fmt(loanAmt)}</td></tr>
      <tr><td>Total O/S Loan + Interest</td><td>Rs. ${fmt(totalOS)}</td></tr>
    </table>`;

  document.getElementById('resultsSection').scrollIntoView({behavior:'smooth',block:'start'});
}

function resetForm(){
  ['loanAmount','sYear','sMonth','sDay','eYear','eMonth','eDay'].forEach(id=>{
    document.getElementById(id).value='';
  });
  document.getElementById('errorMsg').className='error-msg';
  document.getElementById('resultsSection').style.display='none';
  document.getElementById('emptyState').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}

function printQuotation(){
  document.getElementById('printHeader').style.display='flex';
  document.getElementById('printTotals').style.display='block';
  window.print();
